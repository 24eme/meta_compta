{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}{% endblock %}</title>

    <link href='{% static '/css/bootstrap.5.3.3.min.css' %}' rel='stylesheet' />
    <link rel="stylesheet" href="{% static 'css/bootstrap-icons.min.css' %}">
    <link rel="stylesheet" href="{% static '/css/main.css' %}" />
</head>
<body>
<main class="container-fluid">
  <div class="row">
  <div class="col-2 shadow-sm border-end bg-body-tertiary">
	  <div class="sticky-top p-3">
    <a href="/" class="d-flex align-items-center mb-3 mb-md-0 me-md-auto link-body-emphasis text-decoration-none">
      <span class="fs-4">Metacompta</span>
    </a>
    <hr />
    <ul class="nav nav-pills flex-column mb-auto">
      <li class="nav-item">
        <a href="/banque" class="nav-link {% if request.resolver_match.url_name == 'banque_list' %}active{% endif %}">
          Banque
        </a>
      </li>
      <li>
        <a href="/pieces?unpaid=true" class="nav-link {% if request.resolver_match.url_name == 'pieces_list' %}active{% endif %}">
          Factures non rapprochées
        </a>
      </li>
      <li>
        <a href="/files" class="nav-link {% if request.resolver_match.url_name == 'files_list' %}active{% endif %}">
          Les justificatifs
        </a>
      </li>
    </ul>
    </div>
  </div>
  <div class="col">
{% block content %}{% endblock %}
  </div>
  </div>
</main>
<footer>
</footer>
</body>
</html>
